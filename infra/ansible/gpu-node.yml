---
- name: Bootstrap KhulnaSoft AI GPU Node
  hosts: gpu_nodes
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install baseline dependencies
      apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Install NVIDIA drivers
      apt:
        name: nvidia-driver-535
        state: present

    - name: Install NVIDIA Container Toolkit
      shell: |
        curl -s -L https://nvidia.github.io/libnvidia-container/gpgkey | apt-key add -
        curl -s -L https://nvidia.github.io/libnvidia-container/$(. /etc/os-release;echo $ID$VERSION_ID)/libnvidia-container.list | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
        apt-get update && apt-get install -y nvidia-container-toolkit
      args:
        creates: /usr/bin/nvidia-container-toolkit

    - name: Configure Docker to use NVIDIA runtime
      copy:
        content: |
          {
              "default-runtime": "nvidia",
              "runtimes": {
                  "nvidia": {
                      "path": "nvidia-container-runtime",
                      "runtimeArgs": []
                  }
              }
          }
        dest: /etc/docker/daemon.json

    - name: Restart Docker
      service:
        name: docker
        state: restarted
