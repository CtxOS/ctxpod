apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ctxpod-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: ide.ctxpod.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ctxpod-control-server
            port:
              number: 3000
  # Wildcard or dynamic hosts will be added here or managed via a controller
